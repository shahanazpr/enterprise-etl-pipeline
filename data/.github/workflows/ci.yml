name: CI Pipeline

# Trigger the workflow on pushes or pull requests to main/master branches
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code so the runner can access it
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'# Adjust this if your project uses a different version
          cache: 'pip'

      # 3. Install project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Install pytest if it's not already in your requirements.txt
          pip install pytest

      # 4. Execute unit tests
      - name: Run unit tests
        run: |
          pytest
        env:
          PYTHONPATH: ${{ github.workspace }}